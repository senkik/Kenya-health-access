services:
  - type: web
    name: kenya-health-api
    env: python
    buildCommand: ./render_build.sh
    startCommand: cd backend && gunicorn backend.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEBUG
        value: "False"
      - key: USE_POSTGRES
        value: "True"
      - key: USE_REDIS
        value: "True"
      - key: GDAL_LIBRARY_PATH
        value: /usr/lib/libgdal.so
      - key: GEOS_LIBRARY_PATH
        value: /usr/lib/libgeos_c.so
      - key: DATABASE_URL
        fromDatabase:
          name: kenya-health-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: kenya-health-cache
          property: connectionString

databases:
  - name: kenya-health-db
    plan: free
    # PostGIS often requires a paid plan on some providers, 
    # but Render's standard pg image usually includes it.
    # verify extension 'postgis' is created.
