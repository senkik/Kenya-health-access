services:
  - type: web
    name: kenya-health-api
    env: python
    buildCommand: ./render_build.sh
    startCommand: cd backend && gunicorn backend.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEBUG
        value: "False"
      - key: USE_POSTGRES
        value: "True"
      - key: USE_REDIS
        value: "True"
      - key: GDAL_LIBRARY_PATH
        value: /usr/lib/libgdal.so
      - key: GEOS_LIBRARY_PATH
        value: /usr/lib/libgeos_c.so
      - key: DATABASE_URL
        fromDatabase:
          name: kenya-health-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: kenya-health-cache
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: AT_USERNAME
        sync: false
      - key: AT_API_KEY
        sync: false

databases:
  - name: kenya-health-db
    plan: free
    ipAllowList: [] # Only allow internal connections

services:
  - type: redis
    name: kenya-health-cache
    plan: free
    ipAllowList: [] # Only allow internal connections
